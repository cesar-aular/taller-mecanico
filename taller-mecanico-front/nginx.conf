server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida (p. ej. /citas, /login al refrescar) la
    # resuelve React Router, así que servimos index.html en vez de dar 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
